profile_id: test_profile
version: 1
unicode:
  normalization: NFC

display:
  normalize_primes: true
  keep_long_s: true
  collapse_spaces: true

norm:
  normalize_primes: true
  lowercase: true
  strip_diacritics: true
  long_s_to_s: true
  remove_punctuation: true
  keep_hyphen: false
  collapse_spaces: true

features:
  marks:
    prime: "퉟"
    acute_vowels: "치칠칤칩칰츼칄칈칍칔"
    macron: "\u0304"
    breve: "\u0306"
  rules:
    - when:
        pattern: "(치퉟|칠퉟|칤퉟|칩퉟|칰퉟|츼퉟|칄퉟|칈퉟|칍퉟|칔퉟)"
      set:
        stress: "primary"
    - when:
        contains: "퉟"
      set:
        has_prime: true
