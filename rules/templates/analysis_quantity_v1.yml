profile_id: analysis_quantity_v1
name: Quantity Analysis Profile
version: 1
description: Analysis profile with stress/quantity-oriented feature extraction skeleton.
unicode:
  normalization: NFC

display:
  normalize_primes: true
  keep_long_s: true
  collapse_spaces: true

norm:
  normalize_primes: true
  lowercase: true
  strip_diacritics: true
  long_s_to_s: true
  remove_punctuation: true
  keep_hyphen: false
  collapse_spaces: true

render:
  enabled: true
  source: display
  parenthesize_accented_vowel: true
  parenthesize_prime_segment: true
  open_paren: "("
  close_paren: ")"
  collapse_spaces: true

features:
  vowels: "aeiouyAEIOUY"
  marks:
    prime: "퉟"
    acute_vowels: "치칠칤칩칰츼칄칈칍칔"
    macron: "\u0304"
    breve: "\u0306"
  rules:
    - when:
        contains_any: "치칠칤칩칰츼칄칈칍칔"
      set:
        has_accented_vowel: true
    - when:
        pattern: "(치퉟|칠퉟|칤퉟|칩퉟|칰퉟|츼퉟|칄퉟|칈퉟|칍퉟|칔퉟)"
      set:
        stress: "primary"
    - when:
        contains: "퉟"
      set:
        has_prime: true

qa:
  enforce_stress_consistency: false
  require_prime_for_primary_stress: false
  require_acute_for_primary_stress: false
