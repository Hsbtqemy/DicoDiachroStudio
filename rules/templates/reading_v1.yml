profile_id: reading_v1
name: Reading Profile
version: 1
description: Diplomatic reading profile preserving long-s and diacritics.
unicode:
  normalization: NFC

display:
  normalize_primes: true
  keep_long_s: true
  collapse_spaces: true

norm:
  normalize_primes: true
  lowercase: false
  strip_diacritics: false
  long_s_to_s: false
  remove_punctuation: false
  keep_hyphen: true
  collapse_spaces: true

render:
  enabled: true
  source: display
  parenthesize_accented_vowel: false
  parenthesize_prime_segment: true
  open_paren: "("
  close_paren: ")"
  collapse_spaces: true

features:
  marks:
    prime: "ʹ"
    acute_vowels: "áéíóúÁÉÍÓÚ"
  rules:
    - when:
        contains: "ʹ"
      set:
        has_prime: true

qa:
  enforce_stress_consistency: false
  require_prime_for_primary_stress: false
  require_acute_for_primary_stress: false
